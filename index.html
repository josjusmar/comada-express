<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#1d4ed8"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Comanda Express"/>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./icon-192.png"/>
  <link rel="icon" href="./favicon.ico" type="image/png"/>
  <title>Comanda Express</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080d18; overflow: hidden; }
    #root { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #splash {
      position: fixed; inset: 0; background: #080d18;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      font-family: 'Segoe UI', sans-serif; color: white; transition: opacity 0.4s;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash-icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: linear-gradient(135deg,#1d4ed8,#7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; margin-bottom: 16px;
    }
    #splash h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    #splash p { font-size: 12px; color: #4b5563; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 32px; }
    #splash-bar { width: 120px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    #splash-fill { height: 100%; width: 0%; background: #3b82f6; border-radius: 2px; animation: load 1.2s ease forwards; }
    @keyframes load { to { width: 100%; } }
    #install-hint {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 9998;
      background: #1d4ed8; color: white; padding: 12px 16px;
      font-family: 'Segoe UI', sans-serif; font-size: 13px; text-align: center;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-icon">&#x1F684;</div>
    <h1>Comanda Express</h1>
    <p>Formaci&#xF3;n AVE &middot; Serveo</p>
    <div id="splash-bar"><div id="splash-fill"></div></div>
  </div>
  <div id="root"></div>
  <div id="install-hint"></div>

  <script>
    function hideSplash() {
      var s = document.getElementById('splash');
      if (s) { s.classList.add('hide'); setTimeout(function(){ s.remove(); }, 400); }
    }
  </script>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="./app_v3.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js');
      });
    }
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS && !window.navigator.standalone) {
      setTimeout(function() {
        var h = document.getElementById('install-hint');
        h.innerHTML = '&#x1F4F2; Pulsa <strong>Compartir</strong> &rarr; <strong>A&ntilde;adir a inicio</strong> <button onclick="this.parentElement.style.display=\'none\'" style="background:transparent;border:none;color:white;font-size:18px;cursor:pointer;float:right">&#x2715;</button>';
        h.style.display = 'block';
      }, 3000);
    }
    var deferredPrompt;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault(); deferredPrompt = e;
      var h = document.getElementById('install-hint');
      h.innerHTML = '&#x1F4F2; <button onclick="installApp()" style="background:#fff;color:#1d4ed8;border:none;border-radius:6px;padding:4px 12px;font-weight:700;cursor:pointer;margin:0 8px">Instalar app</button><button onclick="this.parentElement.style.display=\'none\'" style="background:transparent;border:none;color:white;font-size:16px;cursor:pointer;float:right">&#x2715;</button>';
      h.style.display = 'block';
    });
    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function() {
          document.getElementById('install-hint').style.display = 'none';
          deferredPrompt = null;
        });
      }
    }
  </script>
</body>
</html>
